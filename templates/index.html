<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>IHK Project - Schiffe versenken</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        .game-container
        {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 20px;
        }
        .board-wrapper
        {
            text-align: center;
        }
        .board-wrapper h2
        {
            font-family: sans-serif;
            color: #333;
            margin-bottom: 10px;
        }
        /*Ниже мы делаем сетку 10 на 10 и отступами клеточек друг от друга 2*/
        .grid {
            display: grid;
            grid-template-columns: 30px repeat(10,40px);
            grid-template-rows: 30px repeat(10,40px);
            gap: 2px;
            align-items: center;
            justify-content: center;

        }
        /*Добавляю стиль клеточки*/
        .cell{
            width: 40px;
            height: 40px;
            background-color: #ADD8E6 /*#e0f7fa*/;
            border: 1px solid #b2ebf2; /*тонкая рамка вокруг клетки */
            cursor: pointer; /*курсор превращается в палец при наведении */
        }
        .cell.ship
        {
            background-color: #78909c;
            border-color: #546e7a;
        }
        .cell.miss
        {
            background-color: #b0bec5;
            cursor: not-allowed;
        }
        .cell.hit
        {
            background-color: #ef5350;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>Schiffe versenken - Testumgebung</h1>
    <p>Нажми на кнопку, чтобы симулировать выстрел по сети:</p>
    <div class="game-container">
        <div class="board-wrapper">
            <h2>Мое поле</h2>
            <div id="my-board" class="grid"></div>
        </div>

        <div  class="board-wrapper">
            <h2>Поле противника</h2>
            <div id="enemy-board" class="grid">
        </div>
    </div>



    <script>
        // Инициализируем сетевое соединение с сервером
        const socket = io();
        const letters = ["A","B","C","D","E","F","G","H","I","J"];
        // Функция, которая умеет строить сетку внутри любого контейнера
    // boardId — это ID ящика ("my-board" или "enemy-board")
    // isEnemy — true (если это поле врага, по которому можно кликать) или false
        function createBoard(boardId,isEnemy)
        {
            const board = document.getElementById(boardId);
            //Создаем пустой левый верхний уголок на пересечении осей
            const corner = document.createElement("div");
            board.appendChild(corner);
            //Циклом выводим буквы A-J над столбцами
            for(let i = 0; i < 10; i++)
            {
                const label=document.createElement("div");
                label.innerText=letters[i];
                board.appendChild(label);
            }
            for(let y = 0; y <10 ; y++)
            {
                const numLabel = document.createElement("div");
                numLabel.innerText= y + 1;
                board.appendChild(numLabel);
                for(let x = 0; x < 10 ; x++)
                {
                    const cell = document.createElement("div");
                    cell.className="cell"
                    // Чтобы ID клеток не пересекались, добавим приставку поля:
                    // Например: "my-cell-5-3" или "enemy-cell-5-3"
                    cell.id = `${boardId}-cell-${x}-${y}`;
                    //cell.innerText = `${x},${y}`;
                    // Кликать разрешаем ТОЛЬКО на поле врага!
                    if(isEnemy)
                    {
                        cell.addEventListener("click", () => {
                            sendShot(x,y)
                        });
                    }
                    board.appendChild(cell);
                }
            }
        }
        //Создаем оба поля
        createBoard("my-board",false);
        createBoard("enemy-board",true);
        socket.on("connect",()=> {
            console.log("Успешно подключились к серверу!Запрашиваю корабли...");
            socket.emit("request_my_ships");
        });
        //Слушаем ответ от сервера с матрицей наших кораблей
        socket.on("my_ships_response",(data)=> {
            console.log("Получаем координаты моих кораблей:",data.board);
            const boardMatrix=data.board;
            //Пробегаем по всей матрице 10х10
            for(let y = 0; y <10 ; y++)
            {
                for(let x = 0; x < 10 ; x++)
                {
                    //Если в матрице стоит 1 - это корабрь
                    if(boardMatrix[y][x]===1)
                    {
                        const cellId = `my-board-cell-${x}-${y}`;
                        const cell = document.getElementById(cellId);
                        if(cell)
                        {
                            cell.classList.add("ship"); //Красим в серый
                        }
                    }
                }
            }
        });

        function sendShot(x,y)
        {
            console.log(`Кликнули по клетке: X=${x},Y=${y}`);
            socket.emit("fire_shot",{x:x,y:y});
        }
        socket.on("shot_response",(data)=>{
            const cellId = `enemy-board-cell-${data.x}-${data.y}`;
            const cell= document.getElementById(cellId)
            if(cell)
            {
                if (data.status==="already_shot")
                {
                    alert("Ты сюда уже стрелял!Выбери другую клетку.");
                }
                else
                {
                    cell.classList.add(data.status);
                }

            }
        });
        socket.on("bot_shot",(data)=> {
            console.log(`Вот выстрелил в ответ: X=${data.x},Y=${data.y}, Статус=${data.status}`);
            //Ищем клетку на нашем поле
            const cellId = `my-board-cell-${data.x}-${data.y}`;
            const cell = document.getElementById(cellId);
            if(cell)
            {
                // Добавляем класс (hit или miss).
                // Если бот попал в корабль (ship), класс hit перекрасит его в красный!
                cell.classList.add(data.status);
            }
        });

    </script>
</body>
</html>
